name: Publish npm packages

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Use npm 11
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check release tag matches package versions
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node - "$VERSION" <<'JS'
          const fs = require('node:fs');
          const version = process.argv[2];
          const packages = [
            'packages/pixifact/package.json',
            'packages/pixifact-cli/package.json',
            'packages/create-pixifact/package.json',
          ];

          for (const file of packages) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (pkg.version !== version) {
              throw new Error(`${pkg.name} is ${pkg.version}, expected tag v${version}`);
            }
          }
          JS

      - name: Test
        run: bun run test

      - name: Build pixifact
        run: bun run build

      - name: Build create-pixifact
        working-directory: packages/create-pixifact
        run: bun run build

      - name: Build editor frontend
        run: bun run editor:frontend:build

      - name: Check package contents
        run: |
          for dir in packages/pixifact packages/pixifact-cli packages/create-pixifact; do
            (
              cd "$dir"
              npm pack --dry-run --json .
            )
          done

      - name: Publish packages
        run: |
          publish_package() {
            local dir="$1"
            local name
            local version
            name="$(node -p "require('./${dir}/package.json').name")"
            version="$(node -p "require('./${dir}/package.json').version")"

            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} is already published; skipping."
              return
            fi

            (
              cd "$dir"
              npm publish .
            )
          }

          publish_package packages/pixifact
          publish_package packages/pixifact-cli
          publish_package packages/create-pixifact
